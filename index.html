<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <body>
    <div id="hud">
      <div id="stats">
        <div class="stat"><span class="label">TIME</span><span id="time">0.0</span></div>
        <div class="stat"><span class="label">RINGS</span><span id="rings">0 / 0</span></div>
        <div class="stat"><span class="label">BEST</span><span id="best">—</span></div>
        <div class="stat" id="rival-stat" style="display: none">
          <span class="label">RIVAL</span><span id="rival">—</span>

      <div id="speed-wrap"><div id="speed-bar"></div></div>

      <h1>SKY RACER</h1>
      <p>Fly through every glowing ring as fast as you can.</p>
      <p class="controls">Steer with <b>Arrow keys</b> or <b>WASD</b> &middot; Hold <b>Space</b> to boost</p>
      <p class="start">Press any key to launch</p>
    </div>
